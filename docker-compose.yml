version: '3.8'

services:
  web:
    build: .
    # Käynnistää FastAPI-palvelimen automaattisella päivityksellä (reload) koodia muutettaessa
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    depends_on:
      - redis

  worker:
    build: .
    # Käynnistää Celery-työläisen, joka kuuntelee Redikseen tulevia tehtäviä
    command: celery -A app.worker.celery_app worker --loglevel=info
    volumes:
      - .:/app
    environment:
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"